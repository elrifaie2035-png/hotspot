<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="pragma" content="no-cache" />
    <title>HNX - الأسعار</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="hnx-login">
    <div class="bg-effects" aria-hidden="true"><span class="orb orb-1"></span><span class="orb orb-2"></span><span class="orb orb-3"></span></div>
    <p class="watermark" aria-hidden="true">Hyper Net Experience</p>

    <header class="top-bar">
        <div class="status-pill"><span class="status-dot"></span><span>متصل</span></div>
        <div class="top-msg">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            <span>الشبكة متاحة على مدار 24 ساعة</span>
        </div>
    </header>

    <main class="page">
        <div class="logo-wrap" style="padding-bottom:8px">
            <img class="logo" src="img/hnx-logo.png" alt="HNX" width="220" height="86" />
        </div>
        <h1 class="page-title">باقات الإنترنت</h1>

        <div class="pkg-item glass">
            <div>
                <div class="pkg-name">الباقة الاقتصادية</div>
                <div class="pkg-desc">8 ساعات — 2 ميجا</div>
            </div>
            <div class="pkg-ico"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></div>
        </div>

        <div class="pkg-item glass">
            <div>
                <div class="pkg-name">باقة السرعة</div>
                <div class="pkg-desc">2 ساعة — 5 ميجا</div>
            </div>
            <div class="pkg-ico"><svg viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42A8.96 8.96 0 0 0 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg></div>
        </div>

        <div class="pkg-item glass featured">
            <div>
                <div class="pkg-name">باقة التوفير</div>
                <div class="pkg-desc">24 ساعة — 30 ميجا</div>
                <span class="badge-save">الأكثر توفيراً</span>
            </div>
            <div class="pkg-ico"><svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.89 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg></div>
        </div>

        <p class="footer-brand">Hyper Net Experience</p>
    </main>

    <nav class="bottom-nav">
        <a class="nav-item" href="login.html"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>الرئيسية</span></a>
        <a class="nav-item active" href="prices.html">
            <span class="nav-ico-wrap"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg></span>
            <span>الأسعار</span>
        </a>
        <a class="nav-item" href="agents.html"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4V6h16v12z"/></svg><span>الموزعين</span></a>
    </nav>
</body>
</html>
